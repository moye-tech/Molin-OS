# 墨麟 Hermes OS — 定时作业配置
#
# 这些作业通过 Hermes Agent 的 cronjob 工具管理，非系统 crontab。
# 每次克隆部署后，通过 `molin cron init` 重新创建。
#
# 格式说明:
#   schedule: cron 表达式或人类可读间隔
#   skills: 作业运行时加载的技能列表
#   deliver: 结果投递目标 (origin=当前对话)
#   repeat: forever=一直循环, 数字=执行次数

jobs:
  - name: "墨思情报银行每日扫描"
    id: "ff8d58571b1a"
    schedule: "0 8 * * *"           # 每日 08:00
    skills:
      - blogwatcher
      - last30days
      - world-monitor
      - mirofish-trends
      - arxiv
    deliver: origin
    repeat: forever
    description: "扫描外部情报→LLM提炼→高价值存入memory→输出日报"
    next_run: 2026-05-05T08:00:00+08:00

  - name: "墨迹内容工厂每日闭环"
    id: "36d28ca9139f"
    schedule: "0 9 * * *"           # 每日 09:00
    skills:
      - xiaohongshu-content-engine
      - ffmpeg-video-engine
      - seo-machine
      - agent-marketing-content-creator
      - humanizer
    deliver: origin
    repeat: forever
    description: "获取热点→评估→生产内容→存入memory→输出日报"
    next_run: 2026-05-05T09:00:00+08:00

  - name: "CEO每日简报"
    id: "1fb85e22e60d"
    schedule: "0 9 * * *"           # 每日 09:00
    skills:
      - molin-ceo-persona
      - molin-goals
    deliver: origin
    repeat: forever
    description: "汇总昨日产出/今日待办/系统状态→推送到CEO"
    next_run: 2026-05-05T09:00:00+08:00

  - name: "墨商销售闲鱼消息检测"
    id: "e318dfc348d2"
    schedule: "15,45 9-21 * * *"   # 09:00-21:00 每30分钟
    skills:
      - xianyu-automation
      - marketing-skills-copywriting
      - agent-sales-deal-strategist
    deliver: origin
    repeat: forever
    description: "检测闲鱼新消息→识别交易信号→自动回复→L2上报"
    next_run: 2026-05-04T15:15:00+08:00

  - name: "自学习每周循环"
    id: "e4682a49699d"
    schedule: "0 10 * * 5"          # 每周五 10:00
    skills:
      - skill-discovery
      - self-learning-loop
      - karpathy-autoresearch
    deliver: origin
    repeat: forever
    description: "扫描GitHub/HN/PH→提炼洞察→创建/更新技能→汇报"
    next_run: 2026-05-08T10:00:00+08:00
