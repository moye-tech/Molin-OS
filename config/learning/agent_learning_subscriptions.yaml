# ─────────────────────────────────────────────
# 全局排除规则（所有Agent共用）
# ─────────────────────────────────────────────
global_excludes:
  topics:
    - "awesome-list"              # awesome列表不是具体项目，不精读
    - "tutorial"                  # 教程类不纳入SKILL更新
    - "template"                  # 模板类低价值
    - "fork"                      # 不扫描fork项目
  repositories:
    - "*/awesome-*"               # 排除所有awesome-开头的repo
    - "*/cookiecutter-*"          # 排除项目模板
  languages_exclude:
    - "Jupyter Notebook"          # 排除notebook-only项目（难以工程化）
    - "MATLAB"
    - "R"                         # R语言栈与系统不兼容

# ─────────────────────────────────────────────
# 深度笔记模板约束
# ─────────────────────────────────────────────
deep_note_template:
  required_sections:
    - "核心问题"                   # 这个项目解决了什么本质问题？
    - "关键方法论"                 # 可迁移的思想，非功能描述
    - "与当前能力对比"             # 我们现在怎么做？差距在哪？
    - "立刻可借鉴的3个具体点"      # 有操作步骤的建议
    - "完全吸收后的质变预期"       # Agent会有什么不同？
  min_chars_per_section: 100
  min_total_chars: 800
  reject_if_below_min: true       # 低于最低字符数拒绝写入，要求重新生成
  frontmatter_required:
    - "type: github_deep_read"
    - "agent"
    - "repo"
    - "stars"
    - "date"
    - "tags"