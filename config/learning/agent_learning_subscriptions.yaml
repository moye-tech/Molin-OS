# 墨麟OS — Agent垂直学习订阅配置
# ─────────────────────────────────────────────────────────
# 文件用途：
#   被 scripts/github_vertical_scan.py 和 Cron learn_a1_github_vertical_scan 读取，
#   定义每个Agent的精准学习订阅方向，防止泛化扫描导致知识稀释。
#
# 设计原则：
#   1. 关键词按「核心→延伸→工具」三层设计，搜索时优先核心
#   2. exclude_topics 防止无关项目混入（如教育Agent不看基础设施项目）
#   3. min_stars 门槛过滤低质量项目，保证精读价值
#   4. preferred_languages 减少无法适配的语言栈
#   5. 情报源 intel_feeds 补充GitHub之外的行业动态
# ─────────────────────────────────────────────────────────

version: "1.0"
last_updated: "2026-05-17"
scan_frequency: weekly              # 与 Cron learn_a1 的周期一致
global_settings:
  min_stars: 50                     # 全局最低stars门槛
  max_projects_per_agent: 8         # 扫描阶段候选项目上限（精读阶段再取Top5）
  lookback_days: 7                  # 扫描过去N天的新项目
  skip_if_already_read: true        # 跳过Obsidian中已有精读记录的项目
  github_search_api: "https://api.github.com/search/repositories"
  github_token_env: "GITHUB_TOKEN"

agents:

  # ─────────────────────────────────────────────
  # 墨笔文创 · 全媒体内容Agent
  # ─────────────────────────────────────────────
  mobi_content:
    display_name: "墨笔文创"
    owner_subsidiary: "content_agency"
    obsidian_path: "学习档案/"  # v3.0 flat: 学习档案/银月｜{项目}·{date}.md

    github_topics:
      core:                         # 核心业务关键词（优先搜索）
        - "content-marketing"
        - "copywriting"
        - "seo-tool"
        - "ai-writing"
        - "content-generation"
      extended:                     # 延伸方向
        - "xiaohongshu"
        - "douyin-automation"
        - "social-media-automation"
        - "content-calendar"
        - "markdown-editor"
        - "newsletter"
      tools:                        # 工具类
        - "text-generation"
        - "nlp-chinese"
        - "llm-application"

    github_keywords:                # GitHub Search q= 参数关键词
      - "content marketing ai"
      - "copywriting tool python"
      - "seo automation"
      - "xiaohongshu bot"
      - "social media scheduler"
      - "content strategy ai"

    preferred_languages: ["Python", "TypeScript", "JavaScript"]
    min_stars: 100                  # 内容工具成熟度要求更高
    exclude_topics:
      - "infrastructure"
      - "kubernetes"
      - "database"
      - "hardware"
      - "game"

    intel_feeds:                    # GitHub之外的情报源
      - name: "新榜 · 内容行业周报"
        url: "https://www.newrank.cn/public/info/list.html"
        type: "web_scrape"
        frequency: weekly
      - name: "运营研究社"
        url: "https://www.u1sai.com/"
        type: "web_scrape"
        frequency: weekly
      - name: "ProductHunt · Writing"
        url: "https://www.producthunt.com/topics/writing-tools"
        type: "web_scrape"
        frequency: weekly
      - name: "HN · Content AI"
        query: "site:news.ycombinator.com content AI writing"
        type: "search"
        frequency: weekly

    learning_focus_this_quarter:
      - "AI辅助长内容生产效率提升"
      - "多平台内容自动适配工具链"
      - "中文SEO关键词研究自动化"

  # ─────────────────────────────────────────────
  # 墨学教育 · 逻辑思维教育Agent
  # ─────────────────────────────────────────────
  mobi_edu:
    display_name: "墨学教育"
    owner_subsidiary: "edu_agency"
    obsidian_path: "学习档案/"  # v3.0 flat: 学习档案/元瑶｜{项目}·{date}.md

    github_topics:
      core:
        - "lms"
        - "e-learning"
        - "tutoring"
        - "course-management"
        - "education-technology"
      extended:
        - "spaced-repetition"
        - "ai-tutor"
        - "quiz-generator"
        - "learning-analytics"
        - "student-engagement"
        - "gamification"
