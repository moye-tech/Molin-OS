        - "knowledge-graph"
        - "assessment"

    github_keywords:
      - "AI tutor python"
      - "learning management system"
      - "spaced repetition algorithm"
      - "educational AI"
      - "course generator"
      - "student progress tracking"

    preferred_languages: ["Python", "TypeScript", "JavaScript"]
    min_stars: 50
    exclude_topics:
      - "university-research"
      - "hardware"
      - "robotics"
      - "computer-vision"

    intel_feeds:
      - name: "多知网 · 教育行业"
        url: "https://www.duozhi.com/"
        type: "web_scrape"
        frequency: weekly
      - name: "教育部政策公告RSS"
        url: "http://www.moe.gov.cn/jyb_xwfb/"
        type: "rss_scrape"
        frequency: weekly
      - name: "ProductHunt · Education"
        url: "https://www.producthunt.com/topics/education"
        type: "web_scrape"
        frequency: weekly
      - name: "EdTech Review"
        url: "https://edtechreview.in/"
        type: "web_scrape"
        frequency: biweekly

    learning_focus_this_quarter:
      - "AI个性化学习路径推荐算法"
      - "在线试听到付费转化的漏斗优化工具"
      - "学员完课率提升的游戏化机制"

