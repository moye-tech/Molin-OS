# 全局管理器配置
[global]
manager_dispatcher_enabled = true
default_claude_code_enabled = true
max_total_concurrent_tasks = 50
metrics_collection_enabled = true
health_check_interval_seconds = 30

# 降级配置
[fallback]
fallback_to_direct_worker = true
claude_code_fallback_threshold_seconds = 10
max_fallback_attempts = 3
