# 墨麟AI智能系统 v6.6 - Subsidiary Manager 配置
# 定义20个子公司的管理器配置
# worker_types 与 agencies/workers/{type}_worker.py 实际文件一一对应

[managers.ai_manager]
name = "AI子公司管理器"
subsidiary_id = "ai"
worker_types = ["ai"]
max_concurrent_tasks = 5
claude_code_enabled = true
enabled = true
manager_class = "core.managers.ai_manager.AISubsidiaryManager"

