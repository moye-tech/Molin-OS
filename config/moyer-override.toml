# =============================================================================
# 墨麟OS — 系统覆盖配置（实际生效版）
# =============================================================================
# 本文件由系统自动读取，覆盖默认配置。
# 注意：实际模型路由由 Hermes Agent 运行时管理（DeepSeek via OpenRouter）。
# 此文件描述路由策略参考，不作为实际路由引擎（运行时不在代码中读取）。
#
# 实际生效配置见：
# - Hermes Agent 的 config.yaml（provider/model 配置）
# - molib/ceo/dag_engine.py（DAGEngine 的 model_tier 分配）

# ── 模型路由参考配置 ──
# 实际运行时：Hermes Agent 通过 OpenRouter 调用 DeepSeek
# 描述级路由策略，供 DAGEngine 和 Manager 质量门控参考

[model_routing]
default_provider = "deepseek"
fallback_provider = "openrouter"
strategy = "cost_optimized"

# 模型等级映射（对应 DAGEngine 的 model_tier）
# 简单日常任务 → flash   = deepseek-v4-flash（低成本）
# 复杂分析/创作 → pro    = deepseek-v4-pro（深度推理）
# 视觉识别/生成 → vision = qwen3-vl-plus（千问百炼API）
# 视频生成      → video  = HappyHorse-1.0-T2V（千问百炼API）
#
# 注意：实际模型调用由 Hermes Agent 运行时管理（config.yaml + OpenRouter）
# 此处为概念路由参考，DAGEngine 根据任务类型自动分配 model_tier

# ── 向量数据库 ──
# 当前使用：ChromaDB（Herme s 内置）
# 可选升级：Qdrant（需要部署服务）

[vector_database]
engine = "chromadb"

[vector_database.chromadb]
persist_directory = "~/.hermes/vectors/"
collection_name_pattern = "{prefix}_{subsidiary_key}"

# ── 日志配置 ──
[logging]
level = "INFO"
output = ["console", "file"]
file_path = "~/.hermes/logs/moyer.log"
max_file_size_mb = 50
backup_count = 3
enable_audit_log = true
audit_log_path = "~/.hermes/audit/"
