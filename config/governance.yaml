# 墨麟 Hermes OS — 治理规则配置
# =================================
# Version: v1.0

# 5级治理系统（融合数字阈值 + 操作性质描述）
# 此文件是治理级别的单一真相源。SOUL.md 和 AGENTS.md 中的治理描述应引用此处。
approval_levels:
  L0:
    name: 自动执行
    budget_max: 0
    type: auto
    description: 零成本操作，AI自动执行无需审批
    examples:
      - 生成一份内容草稿
      - 查询趋势数据
      - 系统健康检查

  L1:
    name: 通知
    budget_max: 10
    type: notify
    description: AI内部检查后自动执行，完成后通知创始人
    examples:
      - 发布一篇小红书笔记
      - 更新SEO关键词
      - 调整商品定价

  L2:
    name: 审批
    budget_max: 100
    type: approve
    description: 需人类确认后执行（报价 > ¥100 需审批）
    examples:
      - 对外商业提案
      - 大额推广投放
      - 客户交付物发送

  L3:
    name: 董事会审批
    budget_max: 1000
    type: board_approve
    description: 重大决策需全面评估
    examples:
      - 新增产品线
      - 战略方向调整
      - 超预算支出

  L4:
    name: 绝对禁止
    budget_max: 0
    type: forbidden
    description: 涉及真实现金/转账/支付/改价的操作，绝不碰
    examples:
      - 执行转账或支付操作
      - 修改商品价格
      - 访问真实银行账户

# ── 预算控制 ──
# ⚠️ 预算口径说明（两个不同维度，不要混淆）
#
# 1. 此处 monthly_cap = ¥1,360 → AI API + 工具 + 内容推广的「花出去的钱」
#    分类: ai_services(1000) + platform_tools(200) + content_boost(160) = 1360
#    注意：当前系统为零空转模式，实际AI API消耗接近零
#
# 2. 子公司架构的预算是「各子公司运营分配」
#    L0+L1+L2 总计 ¥3,490/月，收入目标 ¥52,000/月
#    详见 molin-company-structure 技能或 docs/墨麟OS-系统架构v5.0-飞书文档.md
#
# 对比:
#   governance monthly_cap = ¥1,360 → 花出去的钱（AI API调用 + 工具订阅 + 推广费）
#   company 总预算 = ¥3,490 → 各子公司的预算分配（运营成本）
#   company 收入目标 = ¥52,000 → 收入目标（不是预算）
#
# Hermes 在触发预算告警时：
# - 检查 AI API 消耗 → 用 governance monthly_cap (1360，当前接近零)
# - 检查子公司预算分配 → 用 company 总预算 (3490)
# - 查看进度 → 用 company 收入目标 (52000)
budget:
  monthly_cap: 1360  # ¥1,360/月 运营预算（AI API + 工具 + 推广）
  categories:
    ai_services: 1000    # AI API调用
    platform_tools: 200  # 平台工具订阅
    content_boost: 160   # 内容推广
  alert_threshold: 0.8   # 80%时告警

# ── 审计追踪 ──
audit:
  enabled: true
  log_retention_days: 90
  log_format: jsonl
  log_path: ~/.molin/audit/

# ── 安全规则 ──
security:
  token_rotation_days: 30
  no_token_in_commits: true
  secrets_management: env_file
