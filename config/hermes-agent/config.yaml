    cost_level: low
    description: 负责提示工程、AI优化
    enabled: true
    max_concurrent: 2
    model_preference: glm-5
    name: AI子公司
    prompts:
      system: 请处理相关业务任务。
      user_template: '请处理以下AI子公司相关任务: {task}'
    tools:
    - prompt_optimization_tool
    - model_evaluation_tool
    triggers:
      keywords:
      - 提示
      - AI
      - 模型
      - 智能
      - 优化
      - 调整
      - 参数
      - 配置
      - 训练
      - 微调
      patterns: []
  ceo_decision:
    approval_level: high
    cost_level: high
    description: 负责ROI分析、三层决策、记忆集成的CEO决策系统
    enabled: true
    max_concurrent: 1
    model_preference: glm-5
    name: CEO决策引擎
    # Hermes Native技能实现
    implementation:
      module: hermes_fusion.skills.hermes_native.ceo_decision_skill
      class: CeoDecisionMolinSkill
    # 技能参数
    parameters:
      min_roi_ratio: 1.5
      min_confidence: 0.7
      max_payback_days: 180
      high_composite_score: 7.0
    prompts:
      system: 你是一个专业的CEO决策引擎，负责分析项目ROI、做出三层决策（GO/NO_GO/NEED_INFO），并集成记忆系统。
      user_template: '请分析以下决策请求: {task}'
    tools:
    - analyze_roi_tool
    - make_decision_tool
    - query_memory_tool
    - daily_optimization_tool
    triggers:
      keywords:
      - 决策
      - 分析
      - ROI
      - 预算
      - 项目
      - 投资
      - 评估
      - 审批
      - ceo
      - ceo决策
      patterns:
      - 决策.*
      - 分析.*
      - ROI.*
      - 预算.*
    # 性能配置
    performance:
      timeout_seconds: 30
      retry_count: 2
      cache_enabled: true
      cache_ttl_seconds: 300
