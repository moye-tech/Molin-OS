cost_control:
  auto_fallback_on_budget: true
  currency_conversion_rate: 7.2
  daily_budget_cny: 50.0
  monthly_budget_cny: 1000.0
  prefer_local_models: true
description: 墨麟AI智能系统 v6.6 - 基于hermes-agent框架
gateways:
  feishu:
    config:
      app_id: ${FEISHU_APP_ID}
      app_secret: ${FEISHU_APP_SECRET}
      verification_token: ${FEISHU_VERIFICATION_TOKEN}
    enabled: true
    type: feishu
generated_by: ConfigAdapter
memory_providers:
  qdrant:
    config:
      collection_content: QDRANT_COLLECTION_CONTENT
      collection_decisions: QDRANT_COLLECTION_DECISIONS
      collection_users: QDRANT_COLLECTION_USERS
      host: QDRANT_HOST
      port: QDRANT_PORT
    enabled: true
    priority: 2
    type: vector
  redis:
    config:
      host: REDIS_HOST
      password: REDIS_PASSWORD
      port: REDIS_PORT
    enabled: true
    priority: 0
    type: cache
  sqlite:
    config:
      db_path: SQLITE_DB_PATH
    enabled: true
    priority: 1
    type: transactional
  supermemory:
    config:
      api_key: SUPERMEMORY_API_KEY
      container_tag: SUPERMEMORY_CONTAINER_TAG
    enabled: false
    priority: 3
    type: semantic
model_preferences:
  ceo_decision:
    budget_constraint: high
    fallback:
    - glm-5
    - deepseek-v4-pro
    primary: qwen3.6-plus
    quality_requirement: high
  code_generation:
    budget_constraint: low
    fallback:
    - deepseek-v4-pro
    primary: qwen3.6-plus
    quality_requirement: medium
  content_creation:
    budget_constraint: medium
    fallback:
    - deepseek-v4-pro
    primary: qwen3.6-plus
    quality_requirement: high
  data_analysis:
    budget_constraint: low
    fallback:
    - minimax-m2.5
    - qwen3.6-plus
    primary: deepseek-v4-pro
    quality_requirement: medium
  routine_tasks:
    budget_constraint: low
    fallback:
    - qwen3.6-plus
    primary: minimax-m2.5
    quality_requirement: low
scheduling:
