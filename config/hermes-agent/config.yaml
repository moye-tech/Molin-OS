  per_skill_limits:
    ai: 2
    data: 2
    dev: 3
    edu: 2
    growth: 3
    ip: 2
    order: 3
    product: 2
    research: 2
    secure: 2
    shop: 3
    cli: 2
    social_media: 2
    seo: 2
    innovation: 1
    thinking: 1
    browser_automation: 1
    vision: 1
    finance: 1
  task_queue_capacity: 100
  worker_pool_size: 4
skills:
