    # Hermes Native技能实现
    implementation:
      module: hermes_fusion.skills.strategy_engine.skill
      class: StrategyEngineSkill
    # 技能参数
    parameters:
      default_industry: mixed
      min_budget: 0
      max_budget: 1000000
      default_timeframe: medium_term
      default_team_size: 3
      roi_threshold_high: 5.0
      roi_threshold_medium: 2.0
      roi_threshold_low: 1.0
    prompts:
      system: 你是一个专业的战略顾问，专注为中国市场AI副业和AI服务业务生成量化可执行策略。支持AI教育、AI服务、AI工具三大行业模板。
