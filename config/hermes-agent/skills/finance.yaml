finance:
  approval_level: high
  config:
    prompt_path: prompts/finance_system.txt
  cost_level: high
  description: 负责金融市场数据分析、交易策略回测、风险管理、投资组合分析等专业金融服务
  enabled: true
  max_concurrent: 1
  model_preference: claude-3-opus
  name: 金融交易子公司
  prompts:
    system: 你是一个专业的金融分析师，精通金融市场分析、交易策略开发、风险管理、投资组合优化。严格遵守风险控制原则，所有建议仅供教育参考，不构成投资建议。必须使用模拟交易环境进行测试，并保持完整的审计日志。
    user_template: '请处理以下金融分析任务: {task}'
