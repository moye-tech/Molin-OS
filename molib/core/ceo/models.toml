# 墨麟AI智能系统 v8.0 模型路由配置
# DeepSeek 直连作为主力，DashScope 保留 ip/edu 创意类 + 最终兜底

# ── 全局配置 ─────────────────────────────────────────────────
[global]
default_model    = "deepseek-v4-flash"
fallback_model   = "deepseek-v4-flash"
enable_cache     = true
complexity_threshold = 0.7

# ── Provider 配置 ──────────────────────────────────────────
[providers.deepseek]
api_key_env = "DEEPSEEK_API_KEY"
base_url    = "https://api.deepseek.com"
enable_cache = true

[providers.dashscope]
api_key_env      = "DASHSCOPE_API_KEY"
base_url         = "https://dashscope.aliyuncs.com/compatible-mode/v1"
enable_cache     = true
cache_threshold_tokens = 1024

# ── DeepSeek V4-Pro（旗舰推理）─────────────────────────────
[models."deepseek-v4-pro"]
provider         = "deepseek"
model_name       = "deepseek-v4-pro"
api_key_env      = "DEEPSEEK_API_KEY"
base_url_env     = "DEEPSEEK_BASE_URL"
max_tokens       = 8000
context_window   = 1000000
reasoning_effort = "high"
input_cost_cache = 0.000025    # ¥0.025/百万 token（缓存命中）
input_cost_miss  = 0.003       # ¥3/百万 token
output_cost      = 0.006       # ¥6/百万 token
supports_tools   = true
supports_json    = true

# ── DeepSeek V4-Flash（高性价比）──────────────────────────
[models."deepseek-v4-flash"]
provider         = "deepseek"
model_name       = "deepseek-v4-flash"
api_key_env      = "DEEPSEEK_API_KEY"
base_url_env     = "DEEPSEEK_BASE_URL"
max_tokens       = 8000
context_window   = 1000000
reasoning_effort = "low"
input_cost_cache = 0.00002     # ¥0.02/百万 token
input_cost_miss  = 0.001       # ¥1/百万 token
output_cost      = 0.002       # ¥2/百万 token
supports_tools   = true
supports_json    = true

# ── DashScope 保留模型 ─────────────────────────────────────

[models."qwen3.6-plus"]          # ip/edu 创意类
provider         = "dashscope"
model_name       = "qwen3.6-plus"
api_key_env      = "DASHSCOPE_API_KEY"
base_url_env     = "DASHSCOPE_BASE_URL"
max_tokens       = 8000
context_window   = 1000000
cost_per_1k_input  = 0.0008
cost_per_1k_output = 0.0032

[models."qwen3.6-max-preview"]   # 终端哨兵
provider         = "dashscope"
model_name       = "qwen3.6-max-preview"
max_tokens       = 8000
cost_per_1k_input  = 0.003
cost_per_1k_output = 0.012
is_preview       = true

[models."qwen3.6-flash"]         # 最终兜底
provider         = "dashscope"
model_name       = "qwen3.6-flash"
max_tokens       = 4000
cost_per_1k_input  = 0.00015
cost_per_1k_output = 0.0006

[models."glm-5"]                 # 合规检查
provider         = "dashscope"
model_name       = "glm-5"
max_tokens       = 4000
cost_per_1k_input  = 0.003
cost_per_1k_output = 0.003

# !! 保留图像模型（不变更）
[models."qwen-image-2.0"]
provider         = "dashscope"
model_name       = "qwen-image-2.0"
max_tokens       = 1000
context_window   = 8192
cost_per_1k_input  = 0.01
cost_per_1k_output = 0.01
supports_json    = false
supports_tools   = false

[models."wan2.7-image"]
provider         = "dashscope"
model_name       = "wan2.7-image"
max_tokens       = 1000
context_window   = 8192
cost_per_1k_input  = 0.01
cost_per_1k_output = 0.01
supports_json    = false
supports_tools   = false

# ── 路由规则 ───────────────────────────────────────────────

[routing.ceo_decision]
primary    = "deepseek-v4-pro"
peak       = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.code_generation]
primary    = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.code_execution]
primary    = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.data_analysis]
primary    = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.deep_research]
primary    = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.financial_analysis]
primary    = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.compliance_check]
primary    = "deepseek-v4-pro"
fallback   = ["deepseek-v4-flash"]

[routing.content_creation]
primary    = "qwen3.6-plus"           # ip/edu 仍用千问
fallback   = ["deepseek-v4-flash"]

[routing.customer_service]
primary    = "deepseek-v4-flash"
fallback   = ["deepseek-v4-pro"]

[routing.batch_content]
primary    = "deepseek-v4-flash"
fallback   = ["deepseek-v4-flash"]

[routing.routine_tasks]
primary    = "deepseek-v4-flash"
fallback   = ["deepseek-v4-pro"]

[routing.default]
primary    = "deepseek-v4-flash"
fallback   = ["deepseek-v4-pro"]

# ── 成本控制 ───────────────────────────────────────────────

[cost_control]
daily_budget_cny        = 50.0
auto_fallback_on_budget = true
budget_fallback_model   = "deepseek-v4-flash"
max_pro_daily_calls     = 500
prefer_cached           = true
