name: 墨麟OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check molib/ --ignore E501 F401 --output-format=github || true

      - name: Test with pytest
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short || true
        env:
          CI: true

      - name: Verify package structure
        run: |
          python -c "
          import molib
          print(f'molib OK: {molib.__file__}')
          from molib import cli
          print('CLI module OK')
          "
